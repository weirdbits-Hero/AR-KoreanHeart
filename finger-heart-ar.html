<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Heart AR ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0010;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.45;
  }
  #bgCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #mainCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #hud {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
    pointer-events: none;
  }
  .hud-pill {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,180,200,0.25);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 13px;
    color: rgba(255,220,230,0.9);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .hud-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ff6b9d;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }
  #gesture-label {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,180,210,0.9);
    letter-spacing: 0.05em;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(255,100,160,0.6);
    transition: opacity 0.3s;
  }
  #loading-screen {
    position: absolute;
    inset: 0;
    background: #0a0010;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  }
  #loading-screen h1 {
    font-size: 28px;
    color: #ff9dc0;
    font-weight: 300;
    letter-spacing: 0.1em;
  }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,150,200,0.2);
    border-top-color: #ff6b9d;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-screen p {
    color: rgba(255,180,210,0.6);
    font-size: 14px;
    max-width: 280px;
    text-align: center;
    line-height: 1.6;
  }
  #tutorial {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,160,200,0.2);
    border-radius: 16px;
    padding: 14px 22px;
    color: rgba(255,200,220,0.8);
    font-size: 13px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    line-height: 1.7;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>
<div id="loading-screen">
  <h1>✦ Finger Heart AR</h1>
  <div class="loading-spinner"></div>
  <p>Starting camera and loading hand tracking...</p>
</div>

<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="bgCanvas"></canvas>
  <canvas id="mainCanvas"></canvas>
  <div id="hud">
    <div class="hud-pill"><div class="hud-dot"></div><span id="hands-label">0 hands</span></div>
    <div class="hud-pill"><span id="gesture-status">No gesture</span></div>
  </div>
  <div id="gesture-label" id="gesture-label"></div>
  <div id="tutorial">
    Touch your <strong>thumb tip</strong> to your <strong>index finger tip</strong> to make a 💜 finger heart!
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const bgCanvas = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');
const loadingScreen = document.getElementById('loading-screen');
const handsLabel = document.getElementById('hands-label');
const gestureStatus = document.getElementById('gesture-status');
const gestureLabelEl = document.getElementById('gesture-label');
const tutorial = document.getElementById('tutorial');

let W = 0, H = 0;
let currentHands = [];
let particles = [];
let hearts = [];
let bgStars = [];
let lastGestureTime = 0;
let gestureActive = false;
let gestureDebounce = 0;
let frameCount = 0;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  bgCanvas.width = mainCanvas.width = W;
  bgCanvas.height = mainCanvas.height = H;
  initStars();
}

function initStars() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      opacity: Math.random() * 0.5 + 0.1,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function initMediaPipe() {
  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6
  });
  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });
  camera.start().then(() => {
    loadingScreen.style.opacity = '0';
    setTimeout(() => loadingScreen.style.display = 'none', 600);
  });
}

function onResults(results) {
  currentHands = results.multiHandLandmarks || [];
  handsLabel.textContent = currentHands.length === 1 ? '1 hand' :
    currentHands.length === 2 ? '2 hands' : '0 hands';
}

function detectGesture(lm) {
  const thumb = lm[4], index = lm[8];
  const dx = thumb.x - index.x, dy = thumb.y - index.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const wrist = lm[0], mid = lm[12];
  const handSize = Math.sqrt(Math.pow(mid.x-wrist.x,2)+Math.pow(mid.y-wrist.y,2));
  const normDist = dist / (handSize + 0.001);
  return normDist < 0.35;
}

function getScreenPos(lm, idx) {
  return { x: (1 - lm[idx].x) * W, y: lm[idx].y * H };
}

function createHeart(x, y) {
  hearts.push({
    x, y,
    scale: 0,
    targetScale: 1.0 + Math.random() * 0.5,
    life: 1.0,
    decay: 0.006,
    size: 55 + Math.random() * 30,
    color: Math.random() < 0.5 ? '#ff4d8f' : '#cc44ff',
    phase: 'grow'
  });
  for (let i = 0; i < 14; i++) {
    const angle = (Math.PI * 2 / 14) * i + (Math.random() - 0.5) * 0.5;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1.0,
      decay: 0.012 + Math.random() * 0.008,
      size: 6 + Math.random() * 10,
      type: 'heart',
      color: ['#ff4d8f','#ff80b3','#cc44ff','#ff99cc'][Math.floor(Math.random()*4)]
    });
  }
}

function createSparkles(x, y) {
  for (let i = 0; i < 2; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 2;
    particles.push({
      x: x + (Math.random()-0.5)*12,
      y: y + (Math.random()-0.5)*12,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 1,
      life: 1.0,
      decay: 0.03 + Math.random()*0.02,
      size: 2 + Math.random()*5,
      type: 'sparkle',
      color: ['#ffcce0','#ffffff','#ddaaff','#ff99cc'][Math.floor(Math.random()*4)]
    });
  }
}

function drawHeart(ctx2, x, y, size, color, alpha) {
  ctx2.save();
  ctx2.globalAlpha = alpha;
  ctx2.shadowColor = color;
  ctx2.shadowBlur = size * 0.8;
  ctx2.fillStyle = color;
  ctx2.translate(x, y);
  ctx2.beginPath();
  const s = size / 30;
  ctx2.moveTo(0, -s*5);
  ctx2.bezierCurveTo(s*10, -s*18, s*25, -s*8, s*15, s*5);
  ctx2.bezierCurveTo(s*10, s*12, 0, s*20, 0, s*20);
  ctx2.bezierCurveTo(0, s*20, -s*10, s*12, -s*15, s*5);
  ctx2.bezierCurveTo(-s*25, -s*8, -s*10, -s*18, 0, -s*5);
  ctx2.fill();
  ctx2.shadowBlur = 0;
  ctx2.restore();
}

function drawSkeletonHand(lm) {
  const connections = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17]
  ];
  ctx.save();
  ctx.strokeStyle = 'rgba(255,150,200,0.5)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = 'rgba(255,100,180,0.4)';
  ctx.shadowBlur = 6;
  for (const [a,b] of connections) {
    const p1 = getScreenPos(lm, a), p2 = getScreenPos(lm, b);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }
  for (let i = 0; i < 21; i++) {
    const p = getScreenPos(lm, i);
    const isKey = [4,8].includes(i);
    ctx.beginPath();
    ctx.arc(p.x, p.y, isKey ? 5 : 3, 0, Math.PI*2);
    ctx.fillStyle = isKey ? '#ff6baa' : 'rgba(255,180,210,0.7)';
    ctx.shadowColor = isKey ? '#ff4488' : 'transparent';
    ctx.shadowBlur = isKey ? 10 : 0;
    ctx.fill();
  }
  ctx.restore();
}

function renderBg() {
  bgCtx.clearRect(0, 0, W, H);
  for (const s of bgStars) {
    s.twinkle += 0.02;
    s.y -= s.speed;
    if (s.y < -2) s.y = H + 2;
    const op = s.opacity * (0.5 + 0.5 * Math.sin(s.twinkle));
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    bgCtx.fillStyle = `rgba(255,200,230,${op})`;
    bgCtx.fill();
  }
  if (gestureActive) {
    const grad = bgCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.6);
    grad.addColorStop(0, 'rgba(180,0,100,0.04)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, W, H);
  }
}

function renderMain() {
  ctx.clearRect(0, 0, W, H);

  let anyGesture = false;

  for (const lm of currentHands) {
    drawSkeletonHand(lm);
    const detected = detectGesture(lm);
    if (detected) {
      anyGesture = true;
      const thumb = getScreenPos(lm, 4);
      const index = getScreenPos(lm, 8);
      const mx = (thumb.x + index.x) / 2;
      const my = (thumb.y + index.y) / 2;

      if (frameCount % 3 === 0) {
        createSparkles(thumb.x, thumb.y);
        createSparkles(index.x, index.y);
      }

      const now = Date.now();
      if (now - lastGestureTime > 600 && gestureDebounce <= 0) {
        createHeart(mx, my);
        gestureDebounce = 25;
        lastGestureTime = now;
        tutorial.style.opacity = '0';
      }
    }
  }

  if (gestureDebounce > 0) gestureDebounce--;

  gestureActive = anyGesture;
  gestureStatus.textContent = anyGesture ? 'Finger Heart ❤️' : 'No gesture';
  gestureStatus.style.color = anyGesture ? '#ffaacc' : 'rgba(255,200,220,0.6)';

  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    if (h.phase === 'grow') {
      h.scale += (h.targetScale - h.scale) * 0.18;
      if (h.scale > h.targetScale * 0.98) h.phase = 'fade';
    } else {
      h.life -= h.decay;
    }
    if (h.life <= 0) { hearts.splice(i, 1); continue; }

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    drawHeart(ctx, h.x, h.y, h.size * h.scale, h.color, h.life * (h.phase === 'grow' ? h.scale / h.targetScale : 1));
    ctx.restore();
  }

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.globalAlpha = Math.max(0, p.life);
    if (p.type === 'heart') {
      drawHeart(ctx, p.x, p.y, p.size * p.life, p.color, p.life);
    } else {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function renderLoop() {
  frameCount++;
  renderBg();
  renderMain();
  requestAnimationFrame(renderLoop);
}

window.addEventListener('resize', resize);
resize();
renderLoop();

window.addEventListener('load', () => {
  try {
    initMediaPipe();
  } catch(e) {
    document.getElementById('loading-screen').querySelector('p').textContent =
      'Could not load hand tracking. Please try in Chrome or Edge.';
  }
});
</script>
</body>
</html>
